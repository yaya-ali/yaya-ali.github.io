<!-- Turbo Drive: swaps page body on navigation instead of full reloads; prefetches links on hover -->
<script type="module">
  import "https://cdn.jsdelivr.net/npm/@hotwired/turbo@8.0.12/dist/turbo.es2017-esm.min.js";
  let firstLoad = true;
  document.addEventListener("turbo:load", () => {
    if (firstLoad) { firstLoad = false; return; }
    // Chirpy's per-page scripts init on DOMContentLoaded, which never refires
    // after a Turbo body swap — replay it so search/TOC/tooltips rebind.
    document.dispatchEvent(new Event("DOMContentLoaded", { bubbles: true }));
  });
</script>

<!-- Single-button light/dark toggle (replaces Chirpy's 3-way dropdown) -->
<script>
  (function () {
    document.addEventListener("click", function (e) {
      var btn = e.target.closest && e.target.closest("#mode-toggle");
      if (!btn) return;
      e.preventDefault();
      e.stopImmediatePropagation();
      var html = document.documentElement;
      var next = html.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
      html.setAttribute("data-bs-theme", next);
      localStorage.setItem("mode", next);
    }, true);
    function stripDropdown() {
      var btn = document.getElementById("mode-toggle");
      if (btn) btn.removeAttribute("data-bs-toggle");
    }
    document.addEventListener("DOMContentLoaded", stripDropdown);
    document.addEventListener("turbo:load", stripDropdown);
  })();
</script>
